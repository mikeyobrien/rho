name: Android Release

on:
  workflow_dispatch:
    inputs:
      policy_checklist_ack:
        description: 'I acknowledge the release policy and dry-run checklist.'
        required: true
        type: boolean
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Install Dependencies
        run: npm ci

      - name: Install Mobile Dependencies
        run: npm run -s mobile:install

      - name: Require Keystore Secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "Error: One or more Android keystore secrets are missing! Failing fast."
            exit 1
          fi

      - name: Parity Gate
        run: npm run -s parity:gate

      - name: Version Gate Check
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            PKG_VERSION=$(node -p "require('./package.json').version")

            if [[ "$TAG_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-rc\.[0-9]+$ ]]; then
              TAG_BASE_VERSION="${BASH_REMATCH[1]}"
            elif [[ "$TAG_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              TAG_BASE_VERSION="${BASH_REMATCH[1]}"
            else
              echo "Error: Unsupported tag format for version gate: $TAG_NAME"
              exit 1
            fi

            if [ "$TAG_BASE_VERSION" != "$PKG_VERSION" ]; then
              echo "Error: Tag base version $TAG_BASE_VERSION does not match package.json version $PKG_VERSION"
              exit 1
            fi
            echo "Version match verified: $TAG_NAME -> $TAG_BASE_VERSION"
          else
            echo "Manual run, skipping tag version gate."
          fi

      - name: Policy Checklist Gate
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.policy_checklist_ack }}" != "true" ]]; then
              echo "Error: Policy acknowledgement required for manual dispatch."
              exit 1
            fi
            echo "Policy acknowledged via workflow dispatch."
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            if ! grep -q "## Dry-Run Checklist" docs/android-release-runbook.md; then
              echo "Error: Dry-Run Checklist heading missing in runbook!"
              exit 1
            fi
            echo "Runbook checklist verification passed."
          fi

      - name: Build Web App
        run: npm run -s mobile:build

      - name: Sync Capacitor
        run: npm run -s mobile:sync

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > mobile/rho-android/android/app/release-keystore.jks
          echo "KEYSTORE_FILE=${{ github.workspace }}/mobile/rho-android/android/app/release-keystore.jks" >> $GITHUB_ENV

      - name: Build Signed AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: mobile/rho-android/android
        run: ./gradlew :app:bundleRelease

      - name: Build Signed APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: mobile/rho-android/android
        run: ./gradlew :app:assembleRelease

      - name: Verify AAB Artifact & Checksum
        working-directory: mobile/rho-android/android/app/build/outputs/bundle/release
        run: |
          AAB_FILE="app-release.aab"
          if [ ! -f "$AAB_FILE" ]; then
            echo "Error: $AAB_FILE not found!"
            exit 1
          fi
          echo "AAB artifact exists."
          sha256sum "$AAB_FILE" > "$AAB_FILE.sha256"
          cat "$AAB_FILE.sha256"

      - name: Verify APK Artifact & Checksum
        working-directory: mobile/rho-android/android/app/build/outputs/apk/release
        run: |
          APK_FILE="app-release.apk"
          if [ ! -f "$APK_FILE" ]; then
            echo "Error: $APK_FILE not found!"
            exit 1
          fi
          echo "APK artifact exists."
          sha256sum "$APK_FILE" > "$APK_FILE.sha256"
          cat "$APK_FILE.sha256"

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PRERELEASE=false
          if [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            PRERELEASE=true
          elif [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            PRERELEASE=false
          else
            echo "Error: Unsupported tag format for release classification: $TAG_NAME"
            exit 1
          fi

          gh release create "$TAG_NAME" \
            --title "Rho Mobile $TAG_NAME" \
            --notes "See CHANGELOG for details" \
            --draft=false \
            --prerelease=$PRERELEASE

      - name: Upload Release Assets
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release upload "$TAG_NAME" \
            mobile/rho-android/android/app/build/outputs/bundle/release/app-release.aab \
            mobile/rho-android/android/app/build/outputs/bundle/release/app-release.aab.sha256 \
            mobile/rho-android/android/app/build/outputs/apk/release/app-release.apk \
            mobile/rho-android/android/app/build/outputs/apk/release/app-release.apk.sha256 \
            --clobber

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rho-android-release
          path: |
            mobile/rho-android/android/app/build/outputs/bundle/release/app-release.aab
            mobile/rho-android/android/app/build/outputs/bundle/release/app-release.aab.sha256
            mobile/rho-android/android/app/build/outputs/apk/release/app-release.apk
            mobile/rho-android/android/app/build/outputs/apk/release/app-release.apk.sha256
          retention-days: 7
